    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link href="https://fonts.googleapis.com/css2?family=Oxygen:wght@300;400;700&display=swap" rel="stylesheet" />

    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="js/pace.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-bez@1.0.11/src/jquery.bez.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/2.1.2/TweenMax.min.js"></script>
</head>

<body>
    <!-- Título principal con un enlace a la página de inicio -->
    <h1><a href="home.html">👋 WELLCOME</a></h1>
    <!-- Subtítulo con un enlace a la página de inicio -->
    <p><a href="home.html">click here</a></p>

    <!-- Elemento de preloader para mostrar un indicador de carga -->
    <div id="preloader">
        <div class="p">LOADING</div>
    </div>

    <!-- JavaScript en línea para la animación del preloader y transición de la página -->
    <script>
        // Opciones de configuración para el indicador de carga Pace.js
        paceOptions = {
            ajax: true,
            document: true,
            eventLag: false
        };

        // Acciones a realizar una vez que Pace.js haya terminado de cargar
        Pace.on('done', function() {
            // Animar el texto del preloader para desvanecerse y moverse hacia arriba
            $('.p').delay(800).animate({
                top: '30%',
                opacity: '0'
            }, 2500, $.bez([0.19, 1, 0.22, 1]));

            // Animar el contenedor del preloader para moverse fuera de la vista
            $('#preloader').delay(1800).animate({
                top: '-100%'
            }, 2000, $.bez([0.19, 1, 0.22, 1]));

            // Animar el elemento ".title" para desvanecerse y moverse hacia arriba
            TweenMax.from(".title", 2, {
                delay: 1.8,
                y: 10,
                opacity: 0,
                ease: Expo.easeInOut
            })
        });
    </script>

</body>

</html>
